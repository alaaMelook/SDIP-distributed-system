worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ──────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # ─── Rate Limiting Zones ─────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

    # ─── Max Upload Size ─────────────────────────
    client_max_body_size 50m;

    # ─── Upstream Definitions ────────────────────
    upstream auth_backend {
        server auth-service:3001;
    }
    upstream document_backend {
        server document-service:3002;
    }
    upstream ai_backend {
        server ai-service:3003;
    }
    upstream search_backend {
        server search-service:3004;
    }
    upstream audit_backend {
        server audit-service:3006;
    }

    # ─── HTTP → HTTPS Redirect ───────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS Server ────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ─── TLS Configuration ───────────────────
        ssl_certificate     /etc/nginx/ssl/sdip.crt;
        ssl_certificate_key /etc/nginx/ssl/sdip.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ─── Security Headers ────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;

        # ─── Auth Service ────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://auth_backend/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Document Service ────────────────────
        location /api/documents/ {
            limit_req zone=global burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://document_backend/documents/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Larger timeout for file uploads
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ─── Document Upload (stricter rate limit) ──
        location /api/documents/upload {
            limit_req zone=upload burst=2 nodelay;
            limit_req_status 429;

            proxy_pass http://document_backend/documents/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ─── AI Service ──────────────────────────
        location /api/ai/ {
            limit_req zone=global burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://ai_backend/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # AI inference can be slow
            proxy_read_timeout 120s;
        }

        # ─── Search Service ──────────────────────
        location /api/search/ {
            limit_req zone=global burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://search_backend/search/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Audit Service ───────────────────────
        location /api/audit/ {
            limit_req zone=global burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://audit_backend/audit/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Health Check ────────────────────────
        location /health {
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ─── Default: 404 ────────────────────────
        location / {
            return 404 '{"error":"Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
